[target.'cfg(all(target_arch = "arm", target_os = "none"))']
runner = "probe-rs run --chip STM32H723ZG"
# runner = "probe-rs run --probe --protocol swd --speed 1000 --chip STM32H723ZG"
[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip STM32H723ZG"

rustflags = [
    # "-C", "link-arg=-Tlink.x",
    # "-C", "link-arg=--nmagic",
    "-C", "link-arg=-Tdefmt.x",
]

[env]
# DEFMT_LOG = "info"
DEFMT_LOG = "trace"
